<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Link Organizer</title>
    <h:outputStylesheet library="css" name="terminal.css"/>
</h:head>
<h:body>
    <div class="app-header">
        <h1>Link Organizer</h1>
    </div>
    <h:form id="formCadastro">
        <p:growl id="growl" showDetail="true" life="3000"/>
        <p:card header="Criar Novo Link" styleClass="main-card">
            <div class="form-grid">
                <p:inputText value="#{hiperlinkBean.hiperlink.name}"
                             placeholder="Nome do Link" required="true" requiredMessage="Nome é obrigatório" styleClass="input-full"/>
                <p:inputText value="#{hiperlinkBean.hiperlink.url}"
                             placeholder="URL do Link" required="true" requiredMessage="URL é obrigatória" styleClass="input-full"/>
                <p:inputTextarea value="#{hiperlinkBean.hiperlink.notes}"
                                 placeholder="Anotações em tópicos..." rows="5" autoResize="false" styleClass="input-full"/>
                <p:selectOneMenu value="#{hiperlinkBean.grupoId}" style="width:100%">
                    <f:selectItem itemLabel="Sem Grupo" itemValue="#{null}" />
                    <f:selectItems value="#{hiperlinkBean.grupos}" var="g" itemLabel="#{g.grupoName}"  itemValue="#{g.id}"/>
                </p:selectOneMenu>
                <h:panelGroup layout="block" style="margin-top:5px">
                    <h:link outcome="grupo" value="Gerenciar Grupos"/>
                </h:panelGroup>
                <p:selectCheckboxMenu value="#{hiperlinkBean.tagIds}" label="#{empty hiperlinkBean.tagIds ? 'Sem Tags' : 'Tags Selecionadas'}"
                                      multiple="true" updateLabel="true" style="width:100%">
                    <f:selectItems value="#{hiperlinkBean.tags}" var="t" itemLabel="#{t.tagName}" itemValue="#{t.id}"/>
                </p:selectCheckboxMenu>
                <h:panelGroup layout="block" style="margin-top:5px">
                    <h:link outcome="tag" value="Gerenciar Tags"/>
                </h:panelGroup>
                <p:selectOneMenu value="#{hiperlinkBean.hiperlink.color}" style="width:100%">
                    <f:selectItem itemLabel="Selecione uma Cor" itemValue="#{null}"/>
                    <f:selectItems value="#{hiperlinkBean.colors}" var="c" itemLabel="#{c}" itemValue="#{c}" />
                </p:selectOneMenu>
                <p:commandButton value="#{hiperlinkBean.modoEdicao ? 'Atualizar Link' : 'Armazenar Link'}"
                                 action="#{hiperlinkBean.salvar}" process="@form" update="@form :formLista :formCadastro:growl" styleClass="save-button"/>
                <p:commandButton value="Cancelar Edição" rendered="#{hiperlinkBean.modoEdicao}"
                                 action="#{hiperlinkBean.cancelarEdicao}" process="@this" update="@form" />
            </div>
        </p:card>
        </h:form>

        <h:form id="formLista">
        <p:card header="Filtrar" styleClass="main-card">
            <div class="form-grid">
                <!-- Nome -->
                <p:inputText value="#{hiperlinkBean.filtroNome}" placeholder="Buscar por nome... [Mínimo 2 caracteres]" styleClass="input-full" />

                <!-- Grupo -->
                <p:selectOneMenu value="#{hiperlinkBean.filtroGrupoId}" style="width:100%">
                    <f:selectItem itemLabel="Todos os Grupos" itemValue="#{null}"/>
                    <f:selectItem itemLabel="Sem Grupo" itemValue="-1"/>
                    <f:selectItems value="#{hiperlinkBean.grupos}" var="g" itemLabel="#{g.grupoName}" itemValue="#{g.id}" />
                </p:selectOneMenu>

                <!-- Tag -->
                <p:selectOneMenu value="#{hiperlinkBean.filtroTagId}" style="width:100%">
                    <f:selectItem itemLabel="Todas as Tags" itemValue="#{null}"/>
                    <f:selectItem itemLabel="Sem Tags" itemValue="-1"/>
                    <f:selectItems value="#{hiperlinkBean.tags}" var="t" itemLabel="#{t.tagName}" itemValue="#{t.id}"/>
                </p:selectOneMenu>

                <!-- Cor -->
                <p:selectOneMenu value="#{hiperlinkBean.filtroCor}" style="width:100%">
                    <f:selectItem itemLabel="Todas as cores" itemValue="#{null}"/>
                    <f:selectItems value="#{hiperlinkBean.colors}" var="c" itemLabel="#{c}" itemValue="#{c}"/>
                </p:selectOneMenu>

                <!-- Buttons -->
                <div style="margin-top: 10px; display:flex; justify-content: space-between;">
                    <div>
                        <p:commandButton value="Buscar" action="#{hiperlinkBean.buscar}" update="dataViewLinks" process="@form" styleClass="save-button"/>
                        <p:commandButton value="Limpar" action="#{hiperlinkBean.limparFiltro}" update="formLista @form" process="@this" styleClass="edit-button"/>
                    </div>
                    <div>
                        <h:outputText value="Mostar data/hora?"/>
                        <p:inputSwitch value="#{hiperlinkBean.mostrarLog}">
                            <p:ajax update=":formLista:dataViewLinks"/>
                        </p:inputSwitch>
                        <p:button value="Ordenar Links" outcome="ordenacao" styleClass="save-button"/>
                    </div>
                </div>
            </div>
        </p:card>

        <p:dataView id="dataViewLinks" value="#{hiperlinkBean.lista}" var="link" layout="list">
            <p:dataViewListItem>
                <p:card styleClass="link-card">
                    <!-- Titulo -->
                    <h:outputLink value="#{link.url}" target="_blank" styleClass="link-title">
                        #{link.name}
                    </h:outputLink>

                    <!-- Grupo -->
                    <div class="link-group">
                        <h:outputText value="#{link.grupo.grupoName}" rendered="#{not empty link.grupo}"/>
                        <h:outputText value="Sem Grupo" rendered="#{empty link.grupo}" style="color:gray"/>
                    </div>

                    <!-- Datas -->
                    <h:panelGroup rendered="#{hiperlinkBean.mostrarLog}">
                        <div class="link-dates">
                            <div style="font-size: 0.85rem; color: gray; margin-top: 8px;">
                                <h:outputText value="Created: " style="font-weight: bold;"/>
                                <h:outputText value="#{link.dataCriacaoFormatada}" />
                            </div>

                            <div style="font-size: 0.85rem; color: gray;">
                                <h:outputText value="Updated: " style="font-weight: bold;"/>
                                <h:outputText value="#{link.dataAtualizacaoFormatada}" rendered="#{not empty link.dataAtualizacao and link.dataAtualizacao ne link.dataCriacao}"/>
                                <h:outputText value="-" rendered="#{empty link.dataAtualizacao}"/>
                            </div>
                        </div>
                    </h:panelGroup>

                    <!-- Tags -->
                    <div class="link-tags">
                        <ui:repeat value="#{link.tags}" var="tag">
                            <span class="tag-badge">
                                #{tag.tagName}
                            </span>
                        </ui:repeat>
                        <h:outputText value="Sem Tags" rendered="#{empty link.tags}" style="color:gray"/>
                    </div>

                    <!-- Ações -->
                    <div style="margin-top:10px">
                        <p:commandButton value="Editar" action="#{hiperlinkBean.editar(link)}" process="@this" update=":formCadastro" styleClass="edit-button"/>
                        <p:commandButton value="Remover" action="#{hiperlinkBean.remover(link)}" process="@this" update="@form" immediate="true" styleClass="danger-button"/>
                    </div>
                </p:card>
            </p:dataViewListItem>
        </p:dataView>
    </h:form>
</h:body>
</html>
