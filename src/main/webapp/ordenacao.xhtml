<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Ordenar Links</title>
</h:head>
<h:body>
    <h2>Criar Ordem entre Links</h2>
    <h:form>
        <p:selectOneMenu value="#{hiperlinkBean.grupoSelecionado}">
            <f:selectItem itemLabel="Todos os Links" itemValue="#{null}"/>
            <f:selectItem itemLabel="Links sem Grupo" itemValue="-1"/>
            <f:selectItems value="#{hiperlinkBean.grupos}" var="g" itemLabel="#{g.grupoName}" itemValue="#{g.id}"/>
            <p:ajax listener="#{hiperlinkBean.carregarLista}" update="orderList"/>
        </p:selectOneMenu>
        <br /><br />
        <p:orderList id="orderList"
                     value="#{hiperlinkBean.listaIds}"
                     var="id"
                     itemLabel="#{hiperlinkBean.buscarNomePorId(id)}"
                     itemValue="#{id}"
                     converter="jakarta.faces.Long"
                     controlsLocation="none"
                     dragdrop="true"/>
        <br />
        <p:commandButton value="Salvar Ordem" action="#{hiperlinkBean.salvarNovaOrdem}" process="@form" update="@form" styleClass="save-button"/>
        <br /><br />
        <p:button value="Voltar para Home" outcome="index" styleClass="edit-button"/>
    </h:form>
</h:body>
</html>
